<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title></title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="data/GeoConfirmedVenezuela_1.js"></script>
        <script>

        window.twttr = (function(d, s, id) {
          var js, fjs = d.getElementsByTagName(s)[0], t = window.twttr || {};
          if (d.getElementById(id)) return t;
          js = d.createElement(s); js.id = id;
          js.src = "https://platform.twitter.com/widgets.js";
          fjs.parentNode.insertBefore(js, fjs);
          t._e = []; t.ready = function(f) { t._e.push(f); };
          return t;
        }(document, "script", "twitter-wjs"));

        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[10.51883289478418,-67.0890953177899],[10.683072537927702,-66.76035811778985]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
       
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_GoogleTerrain_0');
        map.getPane('pane_GoogleTerrain_0').style.zIndex = 400;
        var layer_GoogleTerrain_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=p&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleTerrain_0',
            opacity: 1.0,
            attribution: '<a href="https://www.google.at/permissions/geoguidelines/attr-guide.html">Map data ©2015 Google</a>',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 20
        });
        layer_GoogleTerrain_0;
        map.addLayer(layer_GoogleTerrain_0);
        function formatSources(sourceStr) {
            if (!sourceStr) return '';
            var firstSource = sourceStr.split(/[\s,]+/)[0].trim();
            
            // YouTube
            if (firstSource.includes('youtube.com') || firstSource.includes('youtu.be')) {
                var videoId = firstSource.split('v=')[1] || firstSource.split('/').pop();
                if (videoId.includes('&')) videoId = videoId.split('&')[0];
                return '<iframe width="100%" height="180" src="https://www.youtube.com/embed/' + videoId + '" frameborder="0" allowfullscreen></iframe>';
            } 
            
            // Twitter / X
            if (firstSource.includes('twitter.com') || firstSource.includes('x.com')) {
                return '<div style="min-width:250px;"><blockquote class="twitter-tweet" data-conversation="none" data-theme="light" data-width="250"><a href="' + firstSource + '"></a></blockquote></div>';
            }
            
            return autolinker.link(firstSource);
        }
        function pop_GeoConfirmedVenezuela_1(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">Date</th>\
                        <td>' + (feature.properties['Date'] !== null ? autolinker.link(String(feature.properties['Date']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Description</th>\
                        <td>' + (feature.properties['Description'] !== null ? autolinker.link(String(feature.properties['Description']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Location</th>\
                        <td>' + (feature.properties['Location'] !== null ? autolinker.link(String(feature.properties['Location']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Sources</th>\
                        <td>' + formatSources(feature.properties['Sources']) + '</td>\
                    </tr>\
                        <th scope="row">Geolocations</th>\
                        <td>' + (feature.properties['Geolocations'] !== null ? autolinker.link(String(feature.properties['Geolocations']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Source type</th>\
                        <td colspan="2">' + (feature.properties['Source type'] !== null ? autolinker.link(String(feature.properties['Source type']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Coordinates</th>\
                        <td>' + (feature.properties['Coordinates'] !== null ? autolinker.link(String(feature.properties['Coordinates']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);

            layer.bindPopup(content, { maxWidth: 300, minWidth: 280, maxHeight: 400 });

            layer.on('popupopen', function() {
                if (typeof twttr !== 'undefined' && twttr.widgets) {
                    twttr.widgets.load(); // Force Twitter à transformer le lien en vidéo
                }
            });
        }

        function style_GeoConfirmedVenezuela_1_0(feature) {
            switch(String(feature.properties['icon'])) {
                case 'icons_0051CA_False_icons_transparent_30.png':
                    return {
                pane: 'pane_GeoConfirmedVenezuela_1',
                interactive: true, icon: L.icon({ iconUrl: 'markers/' + feature.properties['icon'], iconSize: [24, 24] }),
            }
                    break;
                case 'icons_0051CA_False_icons_transparent_70.png':
                    return {
                pane: 'pane_GeoConfirmedVenezuela_1',
                interactive: true, icon: L.icon({ iconUrl: 'markers/' + feature.properties['icon'], iconSize: [24, 24] }),
            }
                    break;
                case 'icons_E00000_False_icons_transparent_203.png':
                    return {
                pane: 'pane_GeoConfirmedVenezuela_1',
                interactive: true, icon: L.icon({ iconUrl: 'markers/' + feature.properties['icon'], iconSize: [24, 24] }),
            }
                    break;
                case 'icons_FF6666_False_icons_transparent_192.png':
                    return {
                pane: 'pane_GeoConfirmedVenezuela_1',
                interactive: true, icon: L.icon({ iconUrl: 'markers/' + feature.properties['icon'], iconSize: [24, 24] }),
            }
                    break;
            }
        }
        map.createPane('pane_GeoConfirmedVenezuela_1');
        map.getPane('pane_GeoConfirmedVenezuela_1').style.zIndex = 401;
        map.getPane('pane_GeoConfirmedVenezuela_1').style['mix-blend-mode'] = 'normal';
        var layer_GeoConfirmedVenezuela_1 = new L.geoJson(json_GeoConfirmedVenezuela_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_GeoConfirmedVenezuela_1',
            layerName: 'layer_GeoConfirmedVenezuela_1',
            pane: 'pane_GeoConfirmedVenezuela_1',
            onEachFeature: pop_GeoConfirmedVenezuela_1,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.marker(latlng, style_GeoConfirmedVenezuela_1_0(feature));
            },
        });
        bounds_group.addLayer(layer_GeoConfirmedVenezuela_1);
        map.addLayer(layer_GeoConfirmedVenezuela_1);
        setBounds();
        </script>        
    </body>
</html>
